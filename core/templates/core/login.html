<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

    <h2>Login</h2>

    {% if error %}
        <p>{{ error }}</p>
    {% endif %}
    
    <form method="POST">
        {% csrf_token %}
        <label>Username:</label>
        {{ form.username }}
        <br><br>
        <label>Password:</label>
        {{ form.password }}
        <br><br>
        <button type="submit">Login</button>
    </form>

</body>
</html>
